name: goldenbraid-k8s-lookup
description: "Orchestrates a plasmid lookup job in the dev cluster."
env:
  - TAG=latest
  - NAME=pDGB3alpha1
  - LIMIT=3

steps:
  - name: submit
    description: "Launch the Kubernetes job"
    command: |
      # Capture the random job name generated by 'generateName'
      JOB_NAME=$(just run-lookup $TAG $NAME $LIMIT | grep -o 'goldenbraid-lookup-[a-z0-9]*')
      echo "JOB_NAME=$JOB_NAME" > $OUTPUT_FILE

  - name: wait
    description: "Wait for Kubernetes to finish execution"
    depends: [submit]
    command: just wait-job $JOB_NAME

  - name: report-success
    description: "Fetch and print results"
    depends: [wait]
    command: just job-logs $JOB_NAME

  - name: report-failure
    description: "Debug failed execution"
    depends: [wait]
    on_failure: true
    command: just job-debug $JOB_NAME
