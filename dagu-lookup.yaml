name: goldenbraid-k8s-lookup
type: graph
description: "Orchestrates a plasmid lookup job in the dev cluster."
params:
  - TAG: latest
  - NAME: pDGB3alpha1
  - LIMIT: 3

steps:
  - name: submit
    description: "Launch the Kubernetes job"
    command: |
      set -euo pipefail
      JOB_OUTPUT=$(just run-lookup ${TAG} ${NAME} ${LIMIT})
      echo "$JOB_OUTPUT" | grep -o 'goldenbraid-lookup-[a-z0-9]*' | head -n 1
    output: JOB_NAME

  - name: wait
    description: "Wait for Kubernetes to finish execution"
    depends: [submit]
    command: just wait-job ${JOB_NAME}

  - name: get-logs
    description: "Fetch and print job output"
    depends: [wait]
    command: just job-logs ${JOB_NAME}

handler_on:
  failure:
    command: |
      if [ -n "${JOB_NAME:-}" ]; then
        just job-debug "${JOB_NAME}"
      else
        echo "Job submission failed before a name could be captured."
      fi
