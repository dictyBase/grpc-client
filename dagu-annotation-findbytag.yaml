name: grpc-client-annotation-findbytag
type: graph
description: "Orchestrates an annotation find-by-tag job"
params:
  schema: "./schemas/annotation-findbytag-params.json"
  values:
    ONTOLOGY: ""
    TAG_NAME: ""
    LIMIT: 20
    CURSOR: 0
    ENV: dev
    NAMESPACE: dev
    KUBE_CFG: ""

steps:
  - id: k8s_generate
    description: "Setup kubernetes config file"
    output: KPATH
    command: |
      set -euo pipefail
      if [ -n "${KUBE_CFG:-}" ]; then
        echo "${KUBE_CFG}"
      elif [ "${ENV}" = 'dev' ]; then
        KTEMP=$(mktemp)
        k3d kubeconfig get k3d-dev-cluster > "${KTEMP}"
        echo "${KTEMP}"
      else
        echo "ERROR: KUBE_CFG must be provided for ${ENV} environment"
        exit 1
      fi

  - id: submit
    depends: [k8s_generate]
    description: "Launch the Kubernetes job"
    command: |
      set -euo pipefail
      _tag=$(printenv TAG)
      _ontology=$(printenv ONTOLOGY)
      _tag_name=$(printenv TAG_NAME | tr '+' ' ')
      _limit=$(printenv LIMIT)
      _cursor=$(printenv CURSOR)
      _namespace=$(printenv NAMESPACE)
      _env=$(printenv ENV)
      JOB_OUTPUT=$(just run-annotation-findbytag "${_tag}" "${_ontology}" "${_tag_name}" "${_limit}" "${_cursor}" "${KPATH}" "${_namespace}" "${_env}")
      echo "${JOB_OUTPUT}"
    output: JOB_NAME

  - id: wait
    depends: [submit]
    description: "Wait for Kubernetes to finish execution"
    command: just wait-job "${JOB_NAME}" "${KPATH}" "${NAMESPACE}" "${ENV}"

  - id: get_logs
    depends: [wait]
    description: "Fetch and print job output"
    command: just job-logs "${JOB_NAME}" "${KPATH}" "${NAMESPACE}" "${ENV}"

handler_on:
  failure:
    command: |
      if [ -n "${JOB_NAME:-}" ]; then
        just job-debug "${JOB_NAME}" "${KPATH}" "${NAMESPACE:-dev}" "${ENV:-dev}"
      else
        echo "Job submission failed before a name could be captured."
      fi
