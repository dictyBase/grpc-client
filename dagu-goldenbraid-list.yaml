name: goldenbraid-list
type: graph
description: "Orchestrates a GoldenBraid list job"
params:
  schema: "./schemas/goldenbraid-list-params.json"
  values:
    FILTER: summary=~GoldenBraid
    ENV: dev
    NAMESPACE: dev
    KUBE_CFG: ""

steps:
  - id: k8s_generate
    description: "Setup kubernetes config file"
    output: KPATH
    command: |
      set -euo pipefail
      if [ -n "${KUBE_CFG:-}" ]; then
        echo "${KUBE_CFG}"
      elif [ "${ENV}" = 'dev' ]; then
        KTEMP=$(mktemp)
        k3d kubeconfig get k3d-dev-cluster > "${KTEMP}"
        echo "${KTEMP}"
      else
        echo "ERROR: KUBE_CFG must be provided for ${ENV} environment"
        exit 1
      fi

  - id: submit
    depends: [k8s_generate]
    description: "Launch the Kubernetes job"
    command: |
      set -euo pipefail
      JOB_OUTPUT=$(just run-list "${TAG}" "${FILTER}" "${KPATH}" "${NAMESPACE}" "${ENV}")
      echo "${JOB_OUTPUT}"
    output: JOB_NAME

  - id: wait
    depends: [submit]
    description: "Wait for Kubernetes to finish execution"
    command: just wait-job "${JOB_NAME}" "${KPATH}" "${NAMESPACE}" "${ENV}"

  - id: get_logs
    depends: [wait]
    description: "Fetch and print job output"
    command: just job-logs "${JOB_NAME}" "${KPATH}" "${NAMESPACE}" "${ENV}"

handler_on:
  failure:
    command: |
      if [ -n "${JOB_NAME:-}" ]; then
        just job-debug "${JOB_NAME}" "${KPATH}" "${NAMESPACE:-dev}" "${ENV:-dev}"
      else
        echo "Job submission failed before a name could be captured."
      fi
